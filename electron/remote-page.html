     electron/remote-page.html — Fold's mobile GESTURE INPUT surface.
     Served by the desktop app (remote-input.js) over the LAN; the same-origin
     WebSocket is the control link. TWO ZONES: the slice zone draws the ACTUAL
     overlay outline streamed from the desktop (form/position/rotation/scale
     all true, over a gray source card); the canvas zone's concentric circles
     SCALE with composition zoom and its crosshair ROTATES with canvas
     rotation — live feedback without rastering the source. Touch positions
     stream to the desktop, which paints them over its own panels (eyes stay
     on the desktop; no local finger dots). Old-iPhone slide-to-pause guards
     against accidental exits. Gesture deltas (drag / pinch / rotate, per
     zone) drive the control bus — contextually by default, mappable. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fold — gesture input</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  html, body { height: 100%; overflow: hidden; background: #0a0a0a; color: #888;
    font: 13px/1.4 -apple-system, system-ui, sans-serif; }
  #pad { position: fixed; inset: 0; touch-action: none; }
  #hud { position: fixed; top: env(safe-area-inset-top, 12px); left: 0; right: 0;
    text-align: center; padding-top: 10px; pointer-events: none; letter-spacing: 0.06em; }
  #hud .st { color: #555; font-size: 11px; text-transform: lowercase; }
  #hud .st.live { color: #3c3; }
</style>
</head>
<body>
<canvas id="pad"></canvas>
<div id="hud"><div class="st" id="status">connecting…</div></div>
<script>
(() => {
  const K = new URL(location.href).searchParams.get('k') || '';
  const pad = document.getElementById('pad');
  const ctx = pad.getContext('2d');
  const statusEl = document.getElementById('status');
  let W = 0, H = 0, dpr = 1;

  // the DESKTOP streams the truth: the real overlay RENDER (ov — a PNG with
  // the persistent touch affordances forced on) plus outline polygons as the
  // fallback, and canvas rotation/zoom. The phone only ever draws these.
  let st = { rot: 0, zoom: 1, polys: null, sa: 1 };
  let ovImg = null, ovSrc = '';

  // ---- websocket link (auto-reconnect) ------------------------------------
  let ws = null, wsOpen = false;
  function connect() {
    ws = new WebSocket(`ws://${location.host}/ws?k=${K}`);
    ws.onopen = () => {
      wsOpen = true;
      statusEl.textContent = 'live — fold is listening';
      statusEl.classList.add('live');
      const ua = navigator.userAgent;
      const name = /iPad/.test(ua) ? 'iPad' : /iPhone/.test(ua) ? 'iPhone' : 'mobile';
      send({ t: 'hi', name });
    };
    ws.onmessage = (e) => {
      try {
        const m = JSON.parse(e.data);
        if (m && m.t === 'st') {
          st = { ...st, ...m };
          if (m.ov && m.ov !== ovSrc) {
            ovSrc = m.ov;
            const im = new Image();
            im.onload = () => { ovImg = im; draw(); };
            im.src = m.ov;
          } else if (!m.ov) { ovImg = null; ovSrc = ''; }
          draw();
        }
      } catch (err) {}
    };
    ws.onclose = () => {
      wsOpen = false;
      statusEl.textContent = 'reconnecting…';
      statusEl.classList.remove('live');
      setTimeout(connect, 1200);
    };
    ws.onerror = () => { try { ws.close(); } catch (e) {} };
  }
  const send = (o) => { if (wsOpen) try { ws.send(JSON.stringify(o)); } catch (e) {} };
  connect();

  try { navigator.wakeLock?.request('screen').catch(() => {}); } catch (e) {}

  // ---- layout ----------------------------------------------------------------
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    pad.width = W * dpr; pad.height = H * dpr;
    pad.style.width = W + 'px'; pad.style.height = H + 'px';
    draw();
  }
  addEventListener('resize', resize);

  const portrait = () => H >= W;
  function zoneAt(x, y) { return portrait() ? (y < H / 2 ? 'slice' : 'canvas') : (x < W / 2 ? 'slice' : 'canvas'); }
  function zoneBox(z) {
    if (portrait()) return z === 'slice' ? { x: 0, y: 0, w: W, h: H / 2 } : { x: 0, y: H / 2, w: W, h: H / 2 };
    return z === 'slice' ? { x: 0, y: 0, w: W / 2, h: H } : { x: W / 2, y: 0, w: W / 2, h: H };
  }
  // the slice zone's SOURCE proxy: the source frame (aspect sa) contained in
  // the zone — polygons and outgoing touch coordinates share it, so the
  // desktop replays touches in true registration.
  function sliceRect() {
    const b = zoneBox('slice'), pad2 = 26;
    const bw = b.w - pad2 * 2, bh = b.h - pad2 * 2 - 30;
    const sa = st.sa || 1;
    let w, h;
    if (bw / bh >= sa) { h = bh; w = h * sa; } else { w = bw; h = w / sa; }
    return { x: b.x + (b.w - w) / 2, y: b.y + 30 + (b.h - 30 - h) / 2, w, h };
  }
  // the canvas zone's OUTPUT proxy: the output frame (aspect oa) contained in
  // the zone — same idea as the slice zone's source card. Finger positions are
  // normalized to THIS rect, so they land 1:1 on the desktop's output panel
  // whatever shape the device gives the zone.
  function canvasRect() {
    const b = zoneBox('canvas'), pad2 = 26;
    const bw = b.w - pad2 * 2, bh = b.h - pad2 * 2 - 30;
    const oa = st.oa || 1;
    let w, h;
    if (bw / bh >= oa) { h = bh; w = h * oa; } else { w = bw; h = w / oa; }
    return { x: b.x + (b.w - w) / 2, y: b.y + 30 + (b.h - 30 - h) / 2, w, h };
  }

  function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.beginPath();
    if (portrait()) { ctx.moveTo(14, H / 2); ctx.lineTo(W - 14, H / 2); }
    else { ctx.moveTo(W / 2, 14); ctx.lineTo(W / 2, H - 14); }
    ctx.stroke();
    ctx.font = '11px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';

    // SLICE zone: the source frame as a gray card + the ACTUAL overlay outline.
    // Touches here relay RAW to the desktop, which replays them through its own
    // source-overlay interaction — identical behaviors to iPad touch.
    const sr = sliceRect();
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(sr.x, sr.y, sr.w, sr.h);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.strokeRect(sr.x, sr.y, sr.w, sr.h);
    if (ovImg) {
      // the desktop's own overlay render — outline + persistent touch
      // affordances (droste arms handle, scale arrows, rotate arcs), exact
      ctx.drawImage(ovImg, sr.x, sr.y, sr.w, sr.h);
    } else if (st.polys) {
      ctx.strokeStyle = 'rgba(255,255,255,0.65)';
      ctx.lineWidth = 1.5;
      for (const poly of st.polys) {
        ctx.beginPath();
        poly.forEach(([u, v], i) => {
          const x = sr.x + u * sr.w, y = sr.y + v * sr.h;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.stroke();
      }
      ctx.lineWidth = 1;
    }
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    const sb = zoneBox('slice');
    ctx.fillText('slice — touch works like the desktop overlay', sb.x + sb.w / 2, sb.y + 18);

    // CANVAS zone: the output-frame card, circles scale with zoom, crosshair
    // rotates with rotation. The card (not the zone) is the coordinate space.
    const cb = zoneBox('canvas');
    const cr = canvasRect();
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(cr.x, cr.y, cr.w, cr.h);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.strokeRect(cr.x, cr.y, cr.w, cr.h);
    const cx = cr.x + cr.w / 2, cy = cr.y + cr.h / 2;
    const base = Math.min(cr.w, cr.h) * 0.42;
    const zf = Math.max(0.3, Math.min(1.8, st.zoom || 1));
    const R = base * (0.35 + 0.45 * zf);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    for (const f of [0.33, 0.66, 1]) {
      ctx.beginPath(); ctx.arc(cx, cy, R * f, 0, Math.PI * 2); ctx.stroke();
    }
    const a = (st.rot || 0) * Math.PI / 180;
    const dx = Math.sin(a), dy = -Math.cos(a);
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.beginPath();
    ctx.moveTo(cx - dx * R * 1.12, cy - dy * R * 1.12); ctx.lineTo(cx + dx * R * 1.12, cy + dy * R * 1.12);
    ctx.moveTo(cx - dy * R * 1.12, cy + dx * R * 1.12); ctx.lineTo(cx + dy * R * 1.12, cy - dx * R * 1.12);
    ctx.stroke();
    ctx.beginPath(); ctx.arc(cx + dx * R, cy + dy * R, 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.fillText('canvas — pinch = zoom · rotate', cb.x + cb.w / 2, cb.y + 18);
  }

  // ---- touch routing --------------------------------------------------------
  // Per-touch zone locks at ITS start. SLICE touches relay RAW (id + UV) — the
  // desktop replays them through its own overlay interaction (move / rotate /
  // two-finger rigid-body, affordances, everything). CANVAS touches stay the
  // delta-gesture path (pinch = zoom, twist = rotation).
  const touchZone = new Map();     // identifier → 'slice' | 'canvas'
  const canvasPts = new Map();     // identifier → {x,y} (canvas-zone gesture math)
  const sliceUV = (x, y) => {
    const sr = sliceRect();
    return [+((x - sr.x) / sr.w).toFixed(4), +((y - sr.y) / sr.h).toFixed(4)];
  };
  const slicePayload = (list) => [...list].map((t) => {
    const [u, v] = sliceUV(t.clientX, t.clientY);
    return [t.identifier % 1000, u, v];
  });

  const freshAcc = () => ({ pinch: 0, rot: 0 });
  let acc = freshAcc(), g0 = null, flushQueued = false;
  function twoFinger() {
    const pts = [...canvasPts.values()];
    if (pts.length < 2) return null;
    return { dist: Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y) || 1, ang: Math.atan2(pts[1].y - pts[0].y, pts[1].x - pts[0].x) };
  }
  function queueFlush() {
    if (flushQueued) return;
    flushQueued = true;
    requestAnimationFrame(() => {
      flushQueued = false;
      const { pinch, rot } = acc;
      acc = freshAcc();
      if (pinch) send({ t: 'p', z: 'canvas', v: pinch });
      if (rot) send({ t: 'r', z: 'canvas', v: rot });
      // canvas-zone finger echo (slice fingers echo via the raw relay):
      // normalized to the FRAME CARD (aspect = the output frame), so the
      // desktop's aspect-fit lands them 1:1 on the panel
      const cr = canvasRect();
      const clamp01 = (n) => Math.max(0, Math.min(1, n));
      send({ t: 'f', az: +(cr.w / cr.h).toFixed(3), p: [...canvasPts.values()].map((q) => [1, +clamp01((q.x - cr.x) / cr.w).toFixed(4), +clamp01((q.y - cr.y) / cr.h).toFixed(4)]) });
    });
  }

  pad.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const sliceStart = [];
    for (const t of e.changedTouches) {
      const z = zoneAt(t.clientX, t.clientY);
      touchZone.set(t.identifier, z);
      if (z === 'slice') sliceStart.push(t);
      else canvasPts.set(t.identifier, { x: t.clientX, y: t.clientY });
    }
    if (sliceStart.length) send({ t: 'tt', k: 's', c: slicePayload(sliceStart), a: slicePayload([...e.touches].filter((t) => touchZone.get(t.identifier) === 'slice')) });
    g0 = twoFinger();
    queueFlush();
  }, { passive: false });

  pad.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const sliceMoved = [];
    for (const t of e.changedTouches) {
      const z = touchZone.get(t.identifier);
      if (z === 'slice') sliceMoved.push(t);
      else if (z === 'canvas') canvasPts.set(t.identifier, { x: t.clientX, y: t.clientY });
    }
    if (sliceMoved.length) send({ t: 'tt', k: 'm', c: slicePayload(sliceMoved), a: slicePayload([...e.touches].filter((t) => touchZone.get(t.identifier) === 'slice')) });
    if (canvasPts.size >= 2) {
      const g = twoFinger();
      if (g0 && g) {
        acc.pinch += (g.dist / g0.dist) - 1;
        let da = (g.ang - g0.ang) * 180 / Math.PI;
        if (da > 180) da -= 360; else if (da < -180) da += 360;
        acc.rot += da;
      }
      g0 = g;
    }
    queueFlush();
  }, { passive: false });

  const lift = (e) => {
    e.preventDefault();
    const sliceEnd = [];
    for (const t of e.changedTouches) {
      const z = touchZone.get(t.identifier);
      touchZone.delete(t.identifier);
      if (z === 'slice') sliceEnd.push(t);
      else canvasPts.delete(t.identifier);
    }
    if (sliceEnd.length) send({ t: 'tt', k: 'e', c: slicePayload(sliceEnd), a: slicePayload([...e.touches].filter((t) => touchZone.get(t.identifier) === 'slice')) });
    g0 = twoFinger();
    queueFlush();
  };
  pad.addEventListener('touchend', lift, { passive: false });
  pad.addEventListener('touchcancel', lift, { passive: false });

  resize();
})();
</script>
</body>
</html>
