     electron/remote-page.html — Fold's mobile GESTURE INPUT surface.
     Served by the desktop app (remote-input.js) over the LAN; the same-origin
     WebSocket is the control link. TWO ZONES: the slice zone draws the ACTUAL
     overlay outline streamed from the desktop (form/position/rotation/scale
     all true, over a gray source card); the canvas zone's concentric circles
     SCALE with composition zoom and its crosshair ROTATES with canvas
     rotation — live feedback without rastering the source. Touch positions
     stream to the desktop, which paints them over its own panels (eyes stay
     on the desktop; no local finger dots). Old-iPhone slide-to-pause guards
     against accidental exits. Gesture deltas (drag / pinch / rotate, per
     zone) drive the control bus — contextually by default, mappable. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fold — gesture input</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  html, body { height: 100%; overflow: hidden; background: #0a0a0a; color: #888;
    font: 13px/1.4 -apple-system, system-ui, sans-serif; }
  #pad { position: fixed; inset: 0; touch-action: none; }
  #hud { position: fixed; top: env(safe-area-inset-top, 12px); left: 0; right: 0;
    text-align: center; padding-top: 10px; pointer-events: none; letter-spacing: 0.06em; }
  #hud .st { color: #555; font-size: 11px; text-transform: lowercase; }
  #hud .st.live { color: #3c3; }
  /* slide to exit (unlock) — bottom bar */
  #unlockWrap { position: fixed; left: 16px; right: 16px;
    bottom: calc(env(safe-area-inset-bottom, 12px) + 14px); height: 52px;
    border: 1px solid #2a2a2a; border-radius: 26px; background: rgba(20,20,20,0.85);
    overflow: hidden; touch-action: none; }
  #unlockHint { position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: #555; font-size: 12px; letter-spacing: 0.12em; }
  #unlockThumb { position: absolute; left: 3px; top: 3px; width: 46px; height: 44px;
    border-radius: 23px; background: #222; border: 1px solid #333; color: #999;
    display: flex; align-items: center; justify-content: center; font-size: 18px; }
  /* paused overlay */
  #paused { position: fixed; inset: 0; background: rgba(10,10,10,0.92); display: none;
    align-items: center; justify-content: center; flex-direction: column; gap: 18px; z-index: 5; }
  #paused.on { display: flex; }
  #resume { padding: 14px 26px; border-radius: 12px; border: 1px solid #333;
    background: #1a1a1a; color: #ccc; font-size: 15px; }
</style>
</head>
<body>
<canvas id="pad"></canvas>
<div id="hud"><div class="st" id="status">connecting…</div></div>
<div id="unlockWrap"><div id="unlockHint">slide to pause input ›››</div><div id="unlockThumb">›</div></div>
<div id="paused"><div>input paused — touches are ignored</div><button id="resume">hold to resume</button></div>
<script>
(() => {
  const K = new URL(location.href).searchParams.get('k') || '';
  const pad = document.getElementById('pad');
  const ctx = pad.getContext('2d');
  const statusEl = document.getElementById('status');
  let W = 0, H = 0, dpr = 1;

  // the DESKTOP streams the truth: the active form's real outline polygons in
  // source-UV space + canvas rotation/zoom. The phone only ever draws these —
  // no local form knowledge, so it can never disagree with the app.
  let st = { rot: 0, zoom: 1, polys: null, sa: 1 };

  // ---- websocket link (auto-reconnect) ------------------------------------
  let ws = null, wsOpen = false;
  function connect() {
    ws = new WebSocket(`ws://${location.host}/ws?k=${K}`);
    ws.onopen = () => {
      wsOpen = true;
      statusEl.textContent = 'live — fold is listening';
      statusEl.classList.add('live');
      const ua = navigator.userAgent;
      const name = /iPad/.test(ua) ? 'iPad' : /iPhone/.test(ua) ? 'iPhone' : 'mobile';
      send({ t: 'hi', name });
    };
    ws.onmessage = (e) => {
      try {
        const m = JSON.parse(e.data);
        if (m && m.t === 'st') { st = { ...st, ...m }; draw(); }
      } catch (err) {}
    };
    ws.onclose = () => {
      wsOpen = false;
      statusEl.textContent = 'reconnecting…';
      statusEl.classList.remove('live');
      setTimeout(connect, 1200);
    };
    ws.onerror = () => { try { ws.close(); } catch (e) {} };
  }
  const send = (o) => { if (wsOpen) try { ws.send(JSON.stringify(o)); } catch (e) {} };
  connect();

  // keep the screen awake during a set (best-effort)
  try { navigator.wakeLock?.request('screen').catch(() => {}); } catch (e) {}

  // ---- layout ----------------------------------------------------------------
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    pad.width = W * dpr; pad.height = H * dpr;
    pad.style.width = W + 'px'; pad.style.height = H + 'px';
    draw();
  }
  addEventListener('resize', resize);

  const touches = new Map();
  const portrait = () => H >= W;
  function zoneAt(x, y) { return portrait() ? (y < H / 2 ? 'slice' : 'canvas') : (x < W / 2 ? 'slice' : 'canvas'); }
  function zoneBox(z) {
    if (portrait()) return z === 'slice' ? { x: 0, y: 0, w: W, h: H / 2 } : { x: 0, y: H / 2, w: W, h: H / 2 };
    return z === 'slice' ? { x: 0, y: 0, w: W / 2, h: H } : { x: W / 2, y: 0, w: W / 2, h: H };
  }
  // the slice zone's SOURCE proxy: the source frame (aspect sa) contained in
  // the zone with padding — polygons AND finger coordinates both live in it,
  // so the desktop echo lands in true registration.
  function sliceRect() {
    const b = zoneBox('slice'), pad2 = 26;
    const bw = b.w - pad2 * 2, bh = b.h - pad2 * 2 - 30;
    const sa = st.sa || 1;
    let w, h;
    if (bw / bh >= sa) { h = bh; w = h * sa; } else { w = bw; h = w / sa; }
    return { x: b.x + (b.w - w) / 2, y: b.y + 30 + (b.h - 30 - h) / 2, w, h };
  }

  function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    ctx.lineWidth = 1;
    // the zone divider
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.beginPath();
    if (portrait()) { ctx.moveTo(14, H / 2); ctx.lineTo(W - 14, H / 2); }
    else { ctx.moveTo(W / 2, 14); ctx.lineTo(W / 2, H - 14); }
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.font = '11px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';

    // SLICE zone: the source frame as a gray card + the ACTUAL overlay outline
    // (streamed from the desktop — form, position, rotation, scale all true)
    const sr = sliceRect();
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(sr.x, sr.y, sr.w, sr.h);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.strokeRect(sr.x, sr.y, sr.w, sr.h);
    if (st.polys) {
      ctx.strokeStyle = 'rgba(255,255,255,0.65)';
      ctx.lineWidth = 1.5;
      for (const poly of st.polys) {
        ctx.beginPath();
        poly.forEach(([u, v], i) => {
          const x = sr.x + u * sr.w, y = sr.y + v * sr.h;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.stroke();
      }
      ctx.lineWidth = 1;
    }
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    const sb = zoneBox('slice');
    ctx.fillText('slice — drag · pinch · rotate', sb.x + sb.w / 2, sb.y + 18);

    // CANVAS zone: circles SCALE with composition zoom, the crosshair ROTATES
    // with canvas rotation — live feedback while you gesture (no raster needed)
    const cb = zoneBox('canvas');
    const cx = cb.x + cb.w / 2, cy = cb.y + cb.h / 2;
    const base = Math.min(cb.w, cb.h) * 0.36;
    const zf = Math.max(0.3, Math.min(1.8, st.zoom || 1));
    const R = base * (0.35 + 0.45 * zf);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    for (const f of [0.33, 0.66, 1]) {
      ctx.beginPath(); ctx.arc(cx, cy, R * f, 0, Math.PI * 2); ctx.stroke();
    }
    const a = (st.rot || 0) * Math.PI / 180;
    const dx = Math.sin(a), dy = -Math.cos(a);
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.beginPath();
    ctx.moveTo(cx - dx * R * 1.12, cy - dy * R * 1.12); ctx.lineTo(cx + dx * R * 1.12, cy + dy * R * 1.12);
    ctx.moveTo(cx - dy * R * 1.12, cy + dx * R * 1.12); ctx.lineTo(cx + dy * R * 1.12, cy - dx * R * 1.12);
    ctx.stroke();
    // the "up" notch — rotation reads at a glance
    ctx.beginPath(); ctx.arc(cx + dx * R, cy + dy * R, 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    ctx.fillText('canvas — pinch = zoom · rotate', cb.x + cb.w / 2, cb.y + 18);
    // (no local finger circles — they render over the DESKTOP app, where the
    //  performer is actually looking)
  }

  // ---- gestures → delta messages (batched per frame) --------------------------
  let locked = true;
  let zone = 'canvas';
  const freshAcc = () => ({ dx: 0, dy: 0, pinch: 0, rot: 0 });
  let acc = freshAcc();
  let flushQueued = false;
  function fingerPts() {
    const sr = sliceRect();
    const out = [];
    for (const q of touches.values()) {
      if (zoneAt(q.x, q.y) === 'slice') {
        out.push([0, +((q.x - sr.x) / sr.w).toFixed(4), +((q.y - sr.y) / sr.h).toFixed(4)]);
      } else {
        const cb = zoneBox('canvas');
        out.push([1, +((q.x - cb.x) / cb.w).toFixed(4), +((q.y - cb.y) / cb.h).toFixed(4)]);
      }
    }
    return out;
  }
  function queueFlush() {
    if (flushQueued) return;
    flushQueued = true;
    requestAnimationFrame(() => {
      flushQueued = false;
      const { dx, dy, pinch, rot } = acc;
      acc = freshAcc();
      const m = Math.min(W, H);
      if (dx || dy) send({ t: 'd', z: zone, x: dx / m, y: dy / m });
      if (pinch) send({ t: 'p', z: zone, v: pinch });
      if (rot) send({ t: 'r', z: zone, v: rot });
      send({ t: 'f', p: fingerPts() });
    });
  }

  let g0 = null;
  function twoFinger() {
    const [a2, b2] = [...touches.values()];
    return { dist: Math.hypot(a2.x - b2.x, a2.y - b2.y) || 1, ang: Math.atan2(b2.y - a2.y, b2.x - a2.x) };
  }

  pad.addEventListener('touchstart', (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) touches.set(t.identifier, { x: t.clientX, y: t.clientY });
    if (touches.size === e.changedTouches.length) {
      const t0 = e.changedTouches[0];
      zone = zoneAt(t0.clientX, t0.clientY);
    }
    if (touches.size === 2) g0 = twoFinger();
    queueFlush();
  }, { passive: false });

  pad.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const moves = [];
    for (const t of e.changedTouches) {
      const prev = touches.get(t.identifier);
      if (!prev) continue;
      moves.push({ dx: t.clientX - prev.x, dy: t.clientY - prev.y });
      touches.set(t.identifier, { x: t.clientX, y: t.clientY });
    }
    if (!locked) return;
    if (touches.size >= 2 && g0) {
      const g = twoFinger();
      acc.pinch += (g.dist / g0.dist) - 1;
      let da = (g.ang - g0.ang) * 180 / Math.PI;
      if (da > 180) da -= 360; else if (da < -180) da += 360;
      acc.rot += da;
      g0 = g;
    } else if (touches.size === 1 && moves.length) {
      acc.dx += moves[0].dx;
      acc.dy += moves[0].dy;
    }
    queueFlush();
  }, { passive: false });

  const lift = (e) => {
    e.preventDefault();
    for (const t of e.changedTouches) touches.delete(t.identifier);
    g0 = touches.size === 2 ? twoFinger() : null;
    queueFlush();   // an empty finger set clears the desktop overlay promptly
  };
  pad.addEventListener('touchend', lift, { passive: false });
  pad.addEventListener('touchcancel', lift, { passive: false });

  // ---- slide to pause (the unlock) — hold to resume ---------------------------
  const wrap = document.getElementById('unlockWrap');
  const thumb = document.getElementById('unlockThumb');
  const paused = document.getElementById('paused');
  let slide = null;
  wrap.addEventListener('touchstart', (e) => { e.preventDefault(); slide = e.changedTouches[0].clientX; }, { passive: false });
  wrap.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (slide == null) return;
    const max = wrap.clientWidth - thumb.offsetWidth - 6;
    const x = Math.max(0, Math.min(max, e.changedTouches[0].clientX - slide));
    thumb.style.transform = `translateX(${x}px)`;
    if (x >= max) {
      slide = null;
      locked = false;
      thumb.style.transform = '';
      paused.classList.add('on');
      send({ t: 'pause' });
    }
  }, { passive: false });
  const slideEnd = (e) => { e.preventDefault(); slide = null; thumb.style.transform = ''; };
  wrap.addEventListener('touchend', slideEnd, { passive: false });
  wrap.addEventListener('touchcancel', slideEnd, { passive: false });

  const resume = document.getElementById('resume');
  let holdT = 0;
  const startHold = (e) => {
    e.preventDefault();
    holdT = setTimeout(() => {
      locked = true;
      paused.classList.remove('on');
      send({ t: 'resume' });
    }, 600);
  };
  const endHold = () => clearTimeout(holdT);
  resume.addEventListener('touchstart', startHold, { passive: false });
  resume.addEventListener('touchend', endHold);
  resume.addEventListener('touchcancel', endHold);

  resize();
})();
</script>
</body>
</html>
