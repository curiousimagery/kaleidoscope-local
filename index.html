<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fold</title>
<meta name="theme-color" content="#0a0a0a">
<!-- iOS standalone (installed PWA, no browser chrome) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fold">
<link rel="icon" href="./favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./fold-icon.svg">
<link rel="stylesheet" href="./src/shell/tokens.css" id="design-tokens">
<link rel="stylesheet" href="./src/shell/styles.css" id="desktop-styles">
</head>
<body>

<!-- work row: the horizontal split (output | divider | controls). wrapped so a
     contextual motion-mode footer can sit beneath it; <body> is a column. -->
<div class="work-row" id="workRow">

<!-- main display slot = the OUTPUT column, structured as a vertical stack: an opaque
     global control BAR, the contextual expand-bands it reveals (output controls /
     canvas controls), then the preview STAGE. Each band takes layout space and pushes
     ONLY the preview down — scoped to this column, so the right panel is never affected. -->
<div class="main-slot" id="mainSlot">
  <!-- global control bar: source input + history + workspace/actions (not parameters) -->
  <div class="output-toolbar" id="outputToolbar">
    <!-- left: source input — upload/camera inline; replaced by the live
         capture/flip/stop controls while the camera runs (updateCameraUI toggles
         display). Inline (no modal) so loading is one tap straight to the OS picker. -->
    <div class="ot-group ot-left">
      <input type="file" accept="image/jpeg,image/png,image/webp,video/*" class="file-input" id="fileInput">
      <button class="ot-btn" id="uploadBtn" title="upload an image or video">upload</button>
      <button class="ot-btn" id="cameraBtn" title="use the live camera">camera</button>
      <!-- in-camera group (Daniel's camera-module spec): the shutter is a record/pause
           TOGGLE (pause = frozen still, record = go live — the mobile pattern), and the
           camera DROPDOWN is the camera identity: current camera selected, every camera
           listed, "quit camera" at the bottom (replaces the old stop button). -->
      <div class="ot-group" id="cameraLive" style="display: none;">
        <select class="ot-btn ot-select" id="cameraSelect" title="camera" hidden></select>
        <!-- record/pause toggle — the first standard ICON+TEXT button (.ot-icontext,
             in the Lab): red dot + "record" when frozen, pause bars + "pause" while
             live. Glyphs are set by updateCameraUI (source-host.js). -->
        <button class="ot-btn ot-icontext" id="shutterBtn" title="pause — freeze the frame">pause</button>
        <button class="ot-btn" id="flipBtn" title="switch front/rear camera">flip</button>
      </div>
    </div>
    <!-- center: history -->
    <div class="ot-group ot-center">
      <!-- fallback glyphs were ← / → -->
      <button class="ot-btn" id="undoBtn" disabled title="undo (⌘Z)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h11a5 5 0 0 1 0 10H8"/><path d="M7 6 4 9l3 3"/></svg></button>
      <button class="ot-btn" id="redoBtn" disabled title="redo (⌘⇧Z)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 9H9a5 5 0 0 0 0 10h7"/><path d="M17 6l3 3-3 3"/></svg></button>
    </div>
    <!-- right: workspace + actions -->
    <div class="ot-group ot-right">
      <!-- fallback glyph was ⇄ -->
      <button class="ot-btn" id="swapBtn" disabled title="swap source / output"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h13"/><path d="M14 5l3 3-3 3"/><path d="M20 16H7"/><path d="M10 13l-3 3 3 3"/></svg></button>
      <!-- still|motion mode selector (Arc 1) — radio semantics: the active segment is
           the current mode; save is still-only, output is motion-only (live camera +
           a running bus keep output reachable; see updateMotionUI) -->
      <span class="ot-mode" role="group" aria-label="mode">
        <button class="ot-btn active" id="stillBtn" title="still mode">still</button>
        <button class="ot-btn" id="motionBtn" disabled title="motion mode">motion</button>
        <!-- perform (Arc 4): the live output eases toward your edits — its own mode
             so live-performance needs never fight the authoring modes -->
        <button class="ot-btn" id="performBtn" disabled title="perform mode — the live output follows your edits">perform</button>
      </span>
      <button class="ot-btn" id="outputBtn" disabled title="live output">output<span class="ot-led" id="outputLed"><i></i><i></i></span></button>
      <!-- per-mode export controls (the app-bar spec): render shows in motion,
           save in still (updateMotionUI gates both) -->
      <button class="ot-btn" id="mfRender" hidden disabled title="render the animation to a video file">render ▸</button>
      <button class="ot-btn" id="openExportBtn" title="save / export">save ▸</button>
      <button class="ot-btn ot-version" id="openDiagBtn" title="diagnostics">·</button>
    </div>
  </div>

  <!-- expand-band: live-output controls (revealed by #outputBtn). Mutually exclusive
       with the canvas band. The at-a-glance output state lives in the #outputBtn LED. -->
  <div class="bar-row output-row" id="outputRow" hidden>
    <span class="or-label">live output</span>
    <button id="recordBtn" title="record the live output to disk">record</button>
    <div class="or-group">
      <span class="setting-label">destination</span>
      <div class="or-group" id="outputDest"></div>
    </div>
    <button id="broadcastBtn" title="start / stop output to the selected destination">start</button>
    <button id="testPatternBtn" class="toggle" title="publish a reference test pattern instead of the program — verify orientation, scale, crop and color in Arena or a recording">test pattern</button>
    <div class="or-group">
      <span class="setting-label">resolution</span>
      <div class="or-group" id="outputResTiers">
        <button class="toggle" data-tier="1280">HD</button>
        <button class="toggle active" data-tier="1920">FHD</button>
        <button class="toggle" data-tier="2560">QHD</button>
        <button class="toggle" data-tier="3840">4K</button>
      </div>
      <span class="res-hint" id="outputResHint"></span>
    </div>
    <div class="or-group" id="syphonNameField" hidden>
      <span class="setting-label">syphon server name</span>
      <input type="text" id="serverNameInput" class="text-input" value="Fold" maxlength="32" spellcheck="false" style="width: 120px;">
    </div>
    <span class="or-status" id="outputStatus"></span>
  </div>

  <!-- (the canvas expand-band is GONE — the canvas controls live in the output
       panel's persistent row + the #canvasPopover) -->

  <!-- preview stage: the kaleidoscope/source canvas, its status caption, the placeholder -->
  <div class="ms-stage" id="msStage">
    <!-- source / status caption — over the preview's top-left; current source + live
         state, plus upload errors and the engine-init error target. -->
    <div class="output-status-area">
      <div class="status" id="status">load an image to start</div>
      <div class="upload-error" id="uploadError"></div>
    </div>
    <div class="placeholder" id="placeholder">
      <strong id="placeholderTitle">kaleidoscope</strong>
      upload an image to begin
    </div>
    <!-- Arc 2a — symmetric sibling panels: source and output are PEERS, middle-aligned,
         ratio set by the stage divider (output-dominant default), swap mirrors the sides
         (row-reverse). Built third-panel-ready: output-staged (Arc 5) joins as one more
         .stage-panel. The dynamic .slot-content wraps are mounted by arrangeSlots. -->
    <!-- Arc 2b resolution — PROGRESSIVE DISCLOSURE (Daniel, round 5): each panel
         persists only its ESSENTIALS beneath the visual (source: scrubber + meta +
         form picker + reset slice; output: frame aspect + reset canvas); the dense
         controls live in a POPOVER opened by the sliders button beside the
         selectors (#slicePopover / #canvasPopover at the end of <body>). -->
    <div class="stage-split" id="stageSplit" hidden>
      <div class="stage-panel stage-src" id="srcPanel">
        <!-- fit/fill toggle (from mobile): fit = whole source aspect-fit; fill = the
             source COVERS the panel space (cropped) for a bigger manipulation
             surface. Icon shows the ACTION you'll take (glyph set by main.js). -->
        <button class="src-fit" id="srcFitBtn" title="fill the panel (crop)"></button>
        <!-- still-mode frame picker for a VIDEO source: scrub to choose the frame to
             work with — deliberately no playback transport (Arc 2c). A mini TIMELINE
             (track + vertical playhead, the mf-track vocabulary), not a slider — the
             visual cue that this is motion content. Sits above the meta line via CSS
             order. -->
        <div class="src-scrub" id="srcScrub" hidden title="drag to pick the frame to work with">
          <div class="ss-playhead" id="srcScrubHead"></div>
        </div>
        <!-- source meta lives WITH the source panel (the one home for source info) -->
        <div class="source-meta" id="sourceMeta">
          <span>—</span>
          <span class="name">—</span>
        </div>
        <!-- persistent source controls: the form picker (header of the form settings —
             it decides which popover rows show) + the slice-settings popover trigger.
             (reset slice lives at the BOTTOM of the popover — Daniel demoted both resets.) -->
        <div class="panel-ctl" id="srcCtl">
          <div class="form-row">
            <div class="form-grid" id="formGrid"></div>
            <button class="ot-btn panel-gear" id="sliceSettingsBtn" title="slice settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="9" cy="8" r="2.4" fill="currentColor"/><circle cx="15" cy="16" r="2.4" fill="currentColor"/></svg></button>
          </div>
        </div>
      </div>
      <div class="stage-divider" id="stageDivider" title="drag to resize the panels"></div>
      <div class="stage-panel stage-out" id="outPanel">
        <!-- perform mode (Arc 4): the LIVE PiP — what the audience currently sees
             (the follower's output), docked over the preview. The main panel below
             it becomes the STAGE for what's up next (it renders your edits
             immediately; the live view eases toward them). -->
        <div class="live-pip" id="livePip" hidden>
          <canvas id="livePipCanvas"></canvas>
          <span class="lp-label"><i class="lp-dot" id="lpDot"></i>live</span>
        </div>
        <!-- persistent output controls: frame aspect (renamed from "frame") + the
             canvas-settings popover trigger. (reset canvas lives at the BOTTOM of
             the popover — Daniel demoted both resets.) -->
        <div class="panel-ctl" id="outCtl">
          <!-- perform: THE transition-speed control (the follower's response; the
               same primitive later drives the staged blend-in) -->
          <label class="slider" id="performFollowRow" hidden>
            <div class="row"><span>transition speed</span><span class="val" id="followVal">0.35s</span></div>
            <input type="range" id="followSpeed" min="0" max="2" step="0.01" value="0.35">
          </label>
          <div class="panel-ctl-row">
            <div class="field">
              <div class="field-label">frame aspect</div>
              <!-- squarest → widest, LANDSCAPE default; clicking the selected ratio
                   again flips portrait ↔ landscape (data-l / data-p labels; 1:1 has
                   no flip). data-asp is the landscape value. -->
              <div class="button-grid-5" id="frameAspect" title="output frame aspect — click the selected ratio again to flip portrait / landscape">
                <button class="toggle active" data-asp="1" data-l="1:1" data-p="1:1">1:1</button>
                <button class="toggle" data-asp="1.25" data-l="5:4" data-p="4:5">5:4</button>
                <button class="toggle" data-asp="1.3333" data-l="4:3" data-p="3:4">4:3</button>
                <button class="toggle" data-asp="1.5" data-l="3:2" data-p="2:3">3:2</button>
                <button class="toggle" data-asp="1.7778" data-l="16:9" data-p="9:16">16:9</button>
              </div>
            </div>
            <button class="ot-btn panel-gear" id="canvasSettingsBtn" title="canvas settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="9" cy="8" r="2.4" fill="currentColor"/><circle cx="15" cy="16" r="2.4" fill="currentColor"/></svg></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- (the right panel + its divider are GONE — Arc 2b dissolved them into the
     per-panel control stacks inside the stage split above) -->

</div><!-- /work-row -->

<!-- motion-mode contextual footer — Arc 3 rework: timeline HEIGHT is the priority.
     Controls cluster LEFT (fat transport) and RIGHT (minimal icon stack) instead of
     a row on top; occasional settings (duration/smoothing/loop/speed/clip/motion
     data) live in the ⋯ overflow menu; render moved to the app bar (per-mode
     export). Hidden unless motion mode is active. -->
<div class="motion-footer" id="motionFooter" hidden>
  <!-- left: three rows of fat buttons (+keyframe/+gesture · prev/next · wide
       play/pause). Keyframe OPS (anchor/auto-space/delete) are contextual to the
       keyframe itself — the #kfMenu context menu on select / right-click. -->
  <div class="mf-left">
    <button class="mf-btn mf-add" id="mfAdd" disabled title="add a keyframe at the scrubber (K)">＋ keyframe</button>
    <button class="mf-btn mf-gesture" id="mfGesture" disabled title="record gesture (coming soon)">＋ gesture</button>
    <button class="mf-btn" id="mfPrev" title="previous keyframe (←)">‹ prev</button>
    <button class="mf-btn" id="mfNext" title="next keyframe (→)">next ›</button>
    <button class="mf-btn mf-play" id="mfPlay" disabled title="play / pause (space)">play</button>
  </div>
  <!-- center: the tall timeline (ruler + track — the big pinch/zoom/pan surface) -->
  <div class="mf-center">
    <div class="mf-ruler" id="mfRuler"></div>
    <div class="mf-track" id="mfTrack" title="drag to scrub">
      <div class="mf-strip" id="mfStrip"></div>
      <div class="mf-markers" id="mfMarkers"></div>
      <div class="mf-playhead" id="mfPlayhead"></div>
    </div>
  </div>
  <!-- right: minimal icon stack (overflow · zoom · fit) -->
  <div class="mf-right">
    <button class="mf-btn" id="mfMore" title="motion settings + data">⋯</button>
    <button class="mf-btn" id="mfZoomOut" title="zoom out timeline (−)">－</button>
    <button class="mf-btn" id="mfZoomIn" title="zoom in timeline (+)">＋</button>
    <button class="mf-btn" id="mfFit" disabled title="fit timeline to view (0)">⛶</button>
  </div>
  <!-- ⋯ overflow: the occasional settings + motion data -->
  <div class="mf-menu" id="mfMoreMenu" hidden>
    <label class="mf-menu-field">duration <span class="val scrub" id="mfDurVal">30.0s</span></label>
    <label class="mf-menu-field">smoothing <span class="val scrub" id="mfSmoothVal">0%</span></label>
    <button class="mf-toggle" id="mfLoop" title="loop the animation — with loop on, the end returns to the first keyframe">loop</button>
    <!-- (25% is deliberately OMITTED until real frame interpolation exists — the
         frame-hold stutter can't produce good results; see BACKLOG) -->
    <div class="mf-menu-field" id="mfSpeed" hidden title="playback speed — slow busy footage so the fold reads">speed
      <span class="mf-speed-btns">
        <button class="mf-btn mf-toggle" data-spd="0.5">50%</button>
        <button class="mf-btn mf-toggle active" data-spd="1">100%</button>
        <button class="mf-btn mf-toggle" data-spd="1.5">150%</button>
        <button class="mf-btn mf-toggle" data-spd="2">200%</button>
      </span>
    </div>
    <button id="mfClip" hidden title="edit clip — trim front/back, bounce/slice loop">edit clip…</button>
    <div class="mf-menu-sep"></div>
    <button id="mfSaveData">download motion data</button>
    <button id="mfLoadData">load motion data</button>
  </div>
  <!-- keyframe context menu — contextual ops on the selected keyframe (shown on
       select / right-click near the marker; kf0 has no ops, so no menu) -->
  <div class="mf-menu kf-menu" id="kfMenu" hidden>
    <button id="kfAnchorPos" title="pin this keyframe at its exact time (A toggles)">anchor position</button>
    <button id="kfAutoSpace" title="space this keyframe evenly between anchors (A toggles)">auto space</button>
    <div class="mf-menu-sep"></div>
    <button id="kfDelete" class="danger" title="delete this keyframe (delete)">delete keyframe</button>
  </div>
  <input type="file" id="mfDataFile" accept="application/json,.json" style="display:none">
</div>

<!-- video export sheet (motion mode) -->
<div class="vid-sheet" id="vidSheet" hidden>
  <div class="vid-card">
    <div class="vid-head"><span>render video</span><button class="vid-x" id="vidClose" title="close">✕</button></div>
    <label class="setting-label">resolution</label>
    <div class="button-grid-3" id="vidRes">
      <button class="toggle" data-long="1920">1080p</button>
      <button class="toggle active" data-long="2560">2.5K</button>
      <button class="toggle" data-long="3072">3K</button>
      <button class="toggle" data-long="3840">4K</button>
      <button class="toggle" data-long="6144">6K</button>
      <button class="toggle" data-long="7680">8K</button>
    </div>
    <label class="setting-label">frame rate</label>
    <div class="row-buttons" id="vidFps">
      <button class="toggle" data-fps="24">24</button>
      <button class="toggle active" data-fps="30">30</button>
      <button class="toggle" data-fps="60">60</button>
    </div>
    <label class="setting-label">include</label>
    <label class="vid-opt"><input type="checkbox" id="vidSourcePreview"> source preview video (.zip)</label>
    <label class="vid-opt"><input type="checkbox" id="vidMotionJSON"> motion data .json (.zip)</label>
    <div class="vid-meta" id="vidMeta"></div>
    <div class="vid-progress" id="vidProgress" hidden><div class="vid-bar" id="vidBar"></div></div>
    <div class="status" id="vidStatus"></div>
    <button class="primary" id="vidRenderBtn" style="width:100%;margin-top:8px;">render</button>
  </div>
</div>

<!-- clip editor sheet (pre-animation video prep: trim; bounce/slice coming) -->
<div class="vid-sheet" id="clipSheet" hidden>
  <div class="vid-card clip-card">
    <div class="vid-head"><span>clip editor</span><button class="vid-x" id="clipClose" title="close">✕</button></div>
    <div class="clip-stage">
      <video id="clipVideo" class="clip-video" muted playsinline></video>
      <canvas id="clipBlend" class="clip-blend" hidden></canvas>
      <div class="clip-baking" id="clipBaking" hidden>baking…</div>
    </div>
    <div class="clip-bar" id="clipBar">
      <div class="clip-region" id="clipRegion"></div>
      <div class="clip-playhead" id="clipPlayhead"></div>
      <div class="clip-handle in" id="clipIn"></div>
      <div class="clip-handle out" id="clipOut"></div>
      <div class="clip-handle cut" id="clipCut" hidden title="slice point — the head segment moves to the back here"></div>
    </div>
    <div class="clip-meta"><span id="clipDur">—</span> · drag the handles to trim front &amp; back</div>
    <div class="clip-mode">
      <span class="clip-mode-label">seamless loop</span>
      <button class="mf-btn mf-toggle active" data-mode="forward" title="no seamless processing — just the trim">trim only</button>
      <button class="mf-btn mf-toggle" data-mode="bounce" title="play forward then reverse (bakes a new clip)">bounce</button>
      <button class="mf-btn mf-toggle" data-mode="slice" title="cut + move the head to the back + crossfade the seam (bakes a new clip)">slice</button>
      <label class="mf-field clip-xfade" id="clipXfadeRow" hidden>crossfade <span class="val scrub" id="clipXfade">0.50s</span></label>
    </div>
    <div class="clip-progress" id="clipProgress" hidden><div class="clip-bar-fill" id="clipBarFill"></div></div>
    <div class="clip-actions">
      <button class="mf-btn" id="clipCancel">cancel</button>
      <button class="mf-btn mf-add" id="clipApply">apply trim</button>
    </div>
  </div>
</div>

<!-- export sheet (global save) — controls relocated from the right sidebar -->
<div class="vid-sheet" id="exportSheet" hidden>
  <div class="vid-card">
    <div class="vid-head"><span>save composition</span><button class="vid-x" id="exportClose" title="close">✕</button></div>
    <label class="setting-label">format</label>
    <div class="row-buttons" id="exportFormats">
      <button data-format="png" class="toggle">PNG</button>
      <button data-format="jpg" class="toggle active">JPG</button>
    </div>
    <label class="setting-label">resolution</label>
    <div class="button-grid-5" id="exportSizes">
      <button class="toggle" data-size="1024">1K</button>
      <button class="toggle" data-size="2048">2K</button>
      <button class="toggle active" data-size="4096">4K</button>
      <button class="toggle" data-size="8192">8K</button>
      <button class="toggle" data-size="max">max</button>
    </div>
    <div class="res-hint" id="resHint"></div>
    <button id="exportPackageBtn" style="width: 100%; margin-top: 4px;" title="zip with the unmodified original included">save package (.zip)</button>
    <button class="primary" id="exportBtn" style="width: 100%; margin-top: 6px;">save composition</button>
    <div class="status" id="exportStatus"></div>
  </div>
</div>

<!-- diagnostics sheet (global) — discrete readout + recent live-output op records
     + full report / raw data -->
<div class="vid-sheet" id="diagSheet" hidden>
  <div class="vid-card">
    <div class="vid-head"><span>diagnostics</span><button class="vid-x" id="diagClose" title="close">✕</button></div>
    <div class="status" id="diag"></div>
    <div class="status" id="diagOps"></div>
    <div class="version-badge" id="versionBadge"></div>
  </div>
</div>

<!-- panel-settings popovers (progressive disclosure) — fixed-position, anchored to
     their .panel-gear trigger at open time (wirePanelPopovers in main.js); body-level
     so the panels' overflow clipping can't cut them off. Single column by design. -->
<div class="panel-popover" id="slicePopover" hidden>
  <!-- form / slice settings (rows show only when they apply to the form) -->
  <div id="sliceGroup">
    <h2 style="font-size: 11px; font-weight: 500; color: #888; text-transform: lowercase; letter-spacing: 0.08em; margin-bottom: 8px;">slice</h2>
    <label class="slider" id="segmentsLabel" style="margin-bottom: 10px;">
      <div class="row"><span>segments</span><span class="val scrub" id="segVal" data-key="segments">12</span></div>
      <input type="range" id="segments" min="2" max="48" step="2" value="12">
    </label>
    <label class="slider" style="margin-bottom: 10px;">
      <div class="row"><span>scale</span><span class="val scrub" id="scaleVal" data-key="sliceScale">1.00×</span></div>
      <input type="range" id="scale" min="0.05" max="3" step="0.005" value="1">
    </label>
    <label class="slider" style="margin-bottom: 10px;">
      <div class="row"><span>rotation</span><span class="val scrub" id="sliceRotVal" data-key="sliceRotation">0°</span></div>
      <input type="range" id="sliceRot" min="0" max="360" step="0.5" value="0">
    </label>
    <label class="slider" id="aspectLabel" style="margin-bottom: 10px; display: none;">
      <div class="row"><span>aspect</span><span class="val scrub" id="aspectVal" data-key="squareAspect">1.00</span></div>
      <input type="range" id="aspect" min="0.25" max="4" step="0.01" value="1">
    </label>
    <label class="slider" id="zoomLabel" style="margin-bottom: 10px; display: none;">
      <div class="row"><span>thickness</span><span class="val scrub" id="zoomVal" data-key="drosteZoom">2.00×</span></div>
      <input type="range" id="zoom" min="1.1" max="16" step="0.05" value="2">
    </label>
    <label class="slider" id="spiralLabel" style="margin-bottom: 10px; display: none;">
      <div class="row"><span>spiral</span><span class="val scrub" id="spiralVal" data-key="drosteSpiral">0</span></div>
      <input type="range" id="spiral" min="0" max="6" step="0.001" value="0">
    </label>
    <label class="slider" id="mirrorLabel" style="margin-bottom: 10px; display: none;">
      <div class="row"><span>tier mirror</span></div>
      <div class="row-buttons" id="mirrorToggle">
        <button class="toggle" data-mirror="0">off</button>
        <button class="toggle active" data-mirror="1">on</button>
      </div>
    </label>
    <label class="slider" id="wedgeMirrorLabel" style="margin-bottom: 10px; display: none;">
      <div class="row"><span>wedge mirror</span></div>
      <div class="row-buttons" id="wedgeMirrorToggle">
        <button class="toggle" data-wedgemirror="0">off</button>
        <button class="toggle active" data-wedgemirror="1">on</button>
      </div>
    </label>
    <button type="button" id="sliceReset" class="reset" title="reset slice and form-specific controls to defaults">reset slice</button>
  </div>
</div>
<div class="panel-popover" id="canvasPopover" hidden>
  <!-- canvas settings (composition-global; frame aspect + reset stay persistent
       under the output panel) -->
  <div class="group">
    <h2>canvas</h2>
    <label class="slider">
      <div class="row"><span>composition zoom</span><span class="val scrub" id="compZoomVal" data-key="canvasZoom">1.00×</span></div>
      <input type="range" id="compZoom" min="0.15" max="4" step="0.01" value="1">
    </label>
    <label class="slider">
      <div class="row"><span>rotation</span><span class="val scrub" id="canvasRotVal" data-key="canvasRotation">0°</span></div>
      <input type="range" id="canvasRot" min="0" max="360" step="0.5" value="0">
    </label>
    <div class="field">
      <div class="field-label">out of bounds</div>
      <div class="button-grid-3" id="oobModes">
        <button class="toggle" data-oob="0">clamp</button>
        <button class="toggle active" data-oob="1">mirror</button>
        <button class="toggle" data-oob="2">transparent</button>
      </div>
    </div>
    <button type="button" id="canvasReset" class="reset" title="reset canvas controls to defaults">reset canvas</button>
  </div>
</div>

<!-- busy overlay for long operations -->
<div class="busy-overlay" id="busyOverlay">
  <div class="busy-card">
    <div class="spinner"></div>
    <div class="busy-msg" id="busyMsg">working…</div>
  </div>
</div>

<script type="module" src="./src/boot.js"></script>

</body>
</html>
